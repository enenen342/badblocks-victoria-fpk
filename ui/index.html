<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Badblocks Victoria</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Badblocks Victoria</h1>
          <p>飞牛系统硬盘坏道检测</p>
        </div>
        <div class="status-pill" id="serviceStatus">连接中</div>
      </header>

      <section class="toolbar">
        <button id="refreshBtn" class="primary">刷新硬盘</button>
        <label>
          块大小
          <select id="blockSize">
            <option value="4096">4096</option>
            <option value="1024">1024</option>
            <option value="512">512</option>
            <option value="8192">8192</option>
          </select>
        </label>
        <span class="hint">默认只读扫描，不会写入硬盘。</span>
      </section>

      <section class="workspace">
        <aside class="disk-panel">
          <div class="panel-title">硬盘列表</div>
          <div id="diskList" class="disk-list"></div>
        </aside>

        <section class="scan-panel">
          <div class="selected">
            <div>
              <span class="muted">当前硬盘</span>
              <strong id="selectedName">未选择</strong>
            </div>
            <div class="actions">
              <button id="startBtn" class="danger" disabled>检测坏道</button>
              <button id="stopBtn" disabled>停止</button>
            </div>
          </div>

          <div class="meters">
            <div>
              <span>进度</span>
              <strong id="progressText">0%</strong>
            </div>
            <div>
              <span>已耗时</span>
              <strong id="elapsedText">0:00</strong>
            </div>
            <div>
              <span>坏块信息 (读 / 写 / 损坏)</span>
              <strong id="badBlocksContainer" style="display: flex; gap: 4px; align-items: baseline; white-space: nowrap;">
                <span id="errRead" class="text-amber">0</span>
                <span class="muted">/</span>
                <span id="errWrite" class="text-orange">0</span>
                <span class="muted">/</span>
                <span id="errCompare" class="text-red">0</span>
              </strong>
            </div>
            <div>
              <span>孤立坏块</span>
              <strong id="badBlocks">0</strong>
            </div>
            <div>
              <span>状态</span>
              <strong id="scanStatus">待机</strong>
            </div>
          </div>

          <div class="progress">
            <div id="progressBar"></div>
          </div>

          <div id="surface" class="surface"></div>
          <pre id="log" class="log"></pre>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
